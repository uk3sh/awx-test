---
# playbooks/create_droplet_from_snapshot.yml

- name: Create a Droplet from a Snapshot in a Specific Team
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - secrets.yml

  vars:
    # Name your droplet however you like
    droplet_name: my-snapshot-droplet-5

    # Choose your region and size slugs
    region: nyc3
    size: s-2vcpu-4gb

    # The snapshot identifier (UUID or slug)
    snapshot_id: "219074024"

    # Point this at a token that has access to your target team
    do_team_token: "{{ DIGITALOCEAN_TOKEN }}"

  tasks:
    - name: Create Droplet from Snapshot
      # Tell the module to use your team token via the env var
      community.digitalocean.digital_ocean_droplet:
        api_token: "{{ do_team_token }}"
        name: "{{ droplet_name }}"
        region: "{{ region }}"
        size: "{{ size }}"
        image: "{{ snapshot_id }}"
        ssh_keys: ['48536093']
        unique_name: true
        timeout: 500
        user_data: |  
          #cloud-config
          runcmd:
            - [ sh, -c, "hostnamectl set-hostname {{ droplet_name }}" ]
            - [ "sh", "-c", "DBPASS=\"$(openssl rand -hex 12)\"; DBNAME=\"db_$(tr -dc 'a-z0-9' </dev/urandom | head -c6)\"; DBUSER=\"user_$(tr -dc 'a-z0-9' </dev/urandom | head -c6)\"; echo \"Generated DBNAME DBUSER DB_PASSWORD \"; SQL=\"CREATE DATABASE IF NOT EXISTS \\`${DBNAME}\\`; CREATE USER IF NOT EXISTS '${DBUSER}'@'%' IDENTIFIED BY '${DBPASS}'; GRANT ALL PRIVILEGES ON \\`${DBNAME}\\`.* TO '${DBUSER}'@'%'; FLUSH PRIVILEGES;\"; mysql --execute=\"$SQL\"; printf 'DB_PASSWORD=%s\nDB_NAME=%s\nDB_USER=%s\n' \"$DBPASS\" \"$DBNAME\" \"$DBUSER\" > /root/mysql.txt; chmod 600 /root/mysql.txt; echo \"DB created and credentials written to /root/mysql.txt\"" ]
            - [ sh, -c, 'set -euo pipefail; cd /var/www/vhosts/staging && GHUB_TOKEN='{{ ghub_token }}' && git clone --depth=1 https://'{{ ghub_token }}'@github.com/strangerstudios/pmpro-hosting.git && rm -f /var/www/vhosts/staging/pmpro-hosting/server/scripts/new-install/seed-config.sh && curl -fsSL https://gist.githubusercontent.com/ukedotsh/8a3cf7f68c69166ffe94ce06b27397eb/raw/4d323f6a34aefe2d6b80d9b05889f118802d62c3/seed-config.sh -o /var/www/vhosts/staging/pmpro-hosting/server/scripts/new-install/seed-config.sh && chmod +x /var/www/vhosts/staging/pmpro-hosting/server/scripts/new-install/seed-install.sh && chmod +x /var/www/vhosts/staging/pmpro-hosting/server/scripts/new-install/seed-config.sh' ]
            - [ sh, -c, "set -eu; export GITHUB_TOKEN='{{ ghub_token }}'; cd /var/www/vhosts/staging/pmpro-hosting/server/scripts/new-install; /var/www/vhosts/staging/pmpro-hosting/server/scripts/new-install/seed-install.sh; set -a; . /root/mysql.txt; set +a; export ADMIN_USER='{{ admin_user }}'; export ADMIN_EMAIL='{{ admin_email }}'; export ADMIN_PASS='{{ admin_pass }}'; export URL=https://'{{ droplet_name }}'; /var/www/vhosts/staging/pmpro-hosting/server/scripts/new-install/seed-config.sh;" ]
      register: my_droplet

    - name: Show Droplet info
      ansible.builtin.debug:
        msg: |
          Droplet ID is {{ my_droplet.data.droplet.id }}
          IPv4 is {{ (my_droplet.data.droplet.networks.v4 | selectattr('type', 'equalto', 'public')).0.ip_address }}

    - name: Tag a resource; creating the tag if it does not exist
      community.digitalocean.digital_ocean_tag:
        oauth_token: "{{ do_team_token }}"
        resource_id: "{{ my_droplet.data.droplet.id }}"
        name: pmpro-hosting-alpha
        state: present

    - name: Create a record using api token
      community.general.cloudflare_dns:
        zone: pmpro.site
        record: "{{ droplet_name }}"
        type: A
        proxied: true
        value: "{{ (my_droplet.data.droplet.networks.v4 | selectattr('type', 'equalto', 'public')).0.ip_address }}"
        api_token: "{{ CF_TOKEN }}"

